version: '3.9'

services:

  client:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mern-client
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - mern-network

  server:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mern-server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    depends_on:
      - mongo
    networks:
      - mern-network

  mongo:
    image: mongo:7
    container_name: mern-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - mern-network

volumes:
  mongo-data:

networks:
  mern-network:
    driver: bridge
